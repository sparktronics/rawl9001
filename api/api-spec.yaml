swagger: '2.0'
info:
  title: PR Review API
  version: 1.0.0
host: cog01k6msqf1e7e5z9m5grb69qmrm.apigateway.us-central1.gateway.dev
schemes:
  - https
paths:
  /webhook:
    post:
      summary: Webhook receiver for PR review
      operationId: receiveWebhook
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - pr_id
              - commit_sha
            properties:
              pr_id:
                type: integer
                description: Pull request ID
              commit_sha:
                type: string
                description: Commit SHA
              debug:
                type: boolean
                description: Enable debug mode to save prompt inputs to GCS
                default: false
      responses:
        "202":
          description: Accepted for processing
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      x-google-backend:
        address: https://us-central1-cog01k6msqf1e7e5z9m5grb69qmrm.cloudfunctions.net/pr-review-webhook
        deadline: 600.0  # 10 minutes (API Gateway maximum)
      security:
        - api_key: []
  /review:
    post:
      summary: Review Pull Request
      operationId: reviewPR
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - pr_id
            properties:
              pr_id:
                type: integer
                description: Pull request ID
              debug:
                type: boolean
                description: Enable debug mode to save prompt inputs to GCS
                default: false
      responses:
        "200":
          description: Review completed successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      x-google-backend:
        address: https://us-central1-cog01k6msqf1e7e5z9m5grb69qmrm.cloudfunctions.net/pr-regression-review
        deadline: 600.0  # 10 minutes (API Gateway maximum)
      security:
        - api_key: []
securityDefinitions:
  api_key:
    type: apiKey
    in: header
    name: x-api-key
    description: API key for authentication